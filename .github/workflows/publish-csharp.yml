name: Publish C# SDK to NuGet

on:
  push:
    tags:
      - 'v*'
      - 'csharp-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Restore dependencies
        run: dotnet restore csharp/SAE.Sdk.csproj
        
      - name: Build
        run: dotnet build csharp/SAE.Sdk.csproj -c Release --no-restore
        
      - name: Pack
        run: dotnet pack csharp/SAE.Sdk.csproj -c Release --no-build -o dist
        
      - name: Push to NuGet
        run: dotnet nuget push dist/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
